<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio | M. Iqbal Ramadhani</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: #010409;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(6, 78, 59, 0.4) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(30, 64, 175, 0.3) 0%, transparent 40%);
            background-attachment: fixed;
            color: #fff; padding: 20px;
            overflow-x: hidden;
        }

        .container { max-width: 480px; margin: 0 auto; padding-bottom: 50px; }

        .reveal { 
            opacity: 0; 
            transform: translateY(30px); 
            transition: all 0.8s ease-out;
        }

        .reveal.active { 
            opacity: 1; 
            transform: translateY(0); 
        }

        .card { 
            background: rgba(255, 255, 255, 0.04); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 30px; padding: 28px; 
            margin-bottom: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 242, 255, 0.4);
        }

        .hero-section { text-align: center; }
        .profile-frame { 
            width: 105px; height: 105px; margin: 0 auto 18px; 
            border-radius: 50%; border: 4px solid #00f2ff; 
            overflow: hidden; 
            box-shadow: 0 0 30px rgba(0,242,255,0.5);
            animation: floatProfile 4s ease-in-out infinite;
        }
        @keyframes floatProfile {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .profile-frame img { width: 100%; height: 100%; object-fit: cover; }
        .typing-text { color: #00ff88; font-weight: 700; border-right: 2px solid #00ff88; }

        /* Animasi Isi Kartu */
        .info-block { 
            margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.05); 
            padding-bottom: 15px; opacity: 0; transform: translateX(-20px); transition: 0.5s ease forwards;
        }
        .reveal.active .info-block { opacity: 1; transform: translateX(0); }
        .reveal.active .info-block:nth-child(1) { transition-delay: 0.2s; }
        .reveal.active .info-block:nth-child(2) { transition-delay: 0.4s; }
        .reveal.active .info-block:nth-child(3) { transition-delay: 0.6s; }
        .reveal.active .info-block:nth-child(4) { transition-delay: 0.8s; }

        .info-block:last-child { border-bottom: none; margin-bottom: 0; }
        .info-block h3 { color: #00f2ff; font-size: 1rem; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .info-block p { font-size: 0.9rem; color: #cbd5e1; line-height: 1.5; }

        /* Statistik */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 5px; }
        .stat-item { text-align: center; background: rgba(255,255,255,0.03); padding: 15px 5px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-number { display: block; font-size: 1.4rem; font-weight: 800; color: #00ff88; }
        .stat-label { font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; }

        /* Timeline & Proyek */
        .timeline { border-left: 3px solid rgba(0, 255, 136, 0.3); padding-left: 20px; }
        .timeline-item { position: relative; margin-bottom: 20px; }
        .timeline-item::before { content: ""; position: absolute; left: -29.5px; top: 6px; width: 15px; height: 15px; background: #00ff88; border-radius: 50%; border: 3px solid #010409; }
        
        .project-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .p-card { background: rgba(255,255,255,0.02); padding: 20px 10px; border-radius: 24px; text-align: center; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; cursor: pointer; }
        .p-card:active { transform: scale(0.95); }
        .p-card i { font-size: 1.8rem; color: #00ff88; margin-bottom: 10px; display: block; }

        /* Modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(1, 4, 9, 0.95); backdrop-filter: blur(15px); align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-box { background: #0d1117; padding: 30px; border-radius: 30px; width: 90%; max-width: 400px; border: 1px solid #00f2ff; position: relative; }
