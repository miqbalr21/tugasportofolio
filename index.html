<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | M. Iqbal Ramadhani</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* SEMUA DESAIN CSS DISATUKAN DI SINI */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: #010409;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(6, 78, 59, 0.4) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(30, 64, 175, 0.3) 0%, transparent 40%);
            background-attachment: fixed;
            color: #fff; padding: 20px;
            overflow-x: hidden;
            perspective: 1500px; 
        }

        .container { max-width: 480px; margin: 0 auto; padding-bottom: 50px; }

        .reveal { 
            opacity: 0; 
            transform: translate3d(0, 50px, -100px) rotateX(-15deg) scale(0.9); 
            transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
            will-change: transform, opacity;
            transform-style: preserve-3d;
            backface-visibility: hidden;
        }

        .reveal.active { 
            opacity: 1; 
            transform: translate3d(0, 0, 0) rotateX(0deg) scale(1); 
        }

        .card { 
            background: rgba(255, 255, 255, 0.04); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 30px; padding: 28px; 
            margin-bottom: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            transition: border-color 0.3s ease;
        }

        .hero-section { text-align: center; }
        .profile-frame { 
            width: 105px; height: 105px; margin: 0 auto 18px; 
            border-radius: 50%; border: 4px solid #00f2ff; 
            overflow: hidden; 
            box-shadow: 0 0 30px rgba(0,242,255,0.5);
            animation: floatProfile 4s ease-in-out infinite;
        }
        @keyframes floatProfile {
            0%, 100% { transform: translate3d(0, 0, 0); }
            50% { transform: translate3d(0, -10px, 0); }
        }
        .profile-frame img { width: 100%; height: 100%; object-fit: cover; }
        .typing-text { color: #00ff88; font-weight: 700; border-right: 2px solid #00ff88; }

        .project-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
        .p-card { 
            background: rgba(255,255,255,0.02); padding: 25px 15px; border-radius: 24px; 
            text-align: center; border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }
        .p-card:active { transform: scale(0.92); background: rgba(0, 242, 255, 0.1); }
        .p-card i { font-size: 2rem; color: #00ff88; margin-bottom: 12px; display: block; }

        .modal { 
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; 
            width: 100%; height: 100%; background: rgba(1, 4, 9, 0.9); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            align-items: center; justify-content: center; opacity: 0; transition: 0.4s;
        }
        .modal.show { opacity: 1; }
        .modal-box { 
            background: #0d1117; padding: 35px; border-radius: 30px; 
            width: 90%; max-width: 420px; border: 1px solid #00f2ff;
            position: relative; transform: translate3d(0, 50px, 0) scale(0.8);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal.show .modal-box { transform: translate3d(0, 0, 0) scale(1); }
        .close-btn { position: absolute; right: 20px; top: 15px; cursor: pointer; color: #ff4444; font-size: 30px; }
        
        .btn { 
            flex: 1; padding: 16px; border-radius: 18px; text-decoration: none; 
            font-weight: 800; font-size: 0.95rem; display: flex; align-items: center; 
            justify-content: center; gap: 10px; color: #fff !important; background: #16a34a;
        }

        .staggered { opacity: 0; transform: translateY(20px); transition: 0.4s; }
    </style>
</head>
<body>

<div class="container">
    <header class="card hero-section reveal active">
        <div class="profile-frame"><img src="IMG-20251117-WA0082.jpg" alt="M. Iqbal"></div>
        <h1 style="color: #00f2ff;">M. Iqbal Ramadhani</h1>
        <div style="font-size: 1rem; color: #94a3b8; margin-bottom: 15px;">I am a <span id="typing" class="typing-text"></span></div>
    </header>

    <section class="card reveal">
        <h2 style="color:#00f2ff; font-size:1.1rem; margin-bottom:12px;"><i class="fas fa-user-circle"></i> Tentang Saya</h2>
        <p style="font-size:0.95rem; line-height:1.6; color:#cbd5e1;">
            Mahasiswa Sistem Informasi di Universitas Komputama Cilacap. Fokus pada pengembangan solusi digital cerdas untuk otomasi bisnis dan agrikultur modern.
        </p>
    </section>

    <section class="card reveal">
        <h2 style="color:#00f2ff; font-size:1.1rem; margin-bottom:20px;"><i class="fas fa-code"></i> Proyek Unggulan</h2>
        <div class="project-grid">
            <div class="p-card" onclick="openModal('tani')"><i class="fas fa-leaf"></i><span>Smart Tani</span></div>
            <div class="p-card" onclick="openModal('absensi')"><i class="fas fa-fingerprint"></i><span>Absensi</span></div>
            <div class="p-card" onclick="openModal('kasir')"><i class="fas fa-wallet"></i><span>Sistem Kasir</span></div>
            <div class="p-card" onclick="openModal('perpus')"><i class="fas fa-book-open"></i><span>E-Perpus</span></div>
        </div>
    </section>

    <footer class="card reveal" style="text-align: center; margin-bottom: 40px;">
        <h2 style="color:#00f2ff; margin-bottom: 15px;">Mari Berkolaborasi!</h2>
        <a href="https://wa.me/628816627097" class="btn" target="_blank"><i class="fab fa-whatsapp"></i> WhatsApp</a>
    </footer>
</div>

<div id="projectModal" class="modal">
    <div class="modal-box">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div id="modalContent"></div>
    </div>
</div>

<script>
    /* SEMUA LOGIKA JAVASCRIPT DISATUKAN DI SINI */

    // 1. ANIMASI KETIK
    const words = ["Information Systems Student", "Young Agripreneur", "System Developer", "Runner"];
    let i=0, j=0, isDel=false;
    function type(){
        let cur=words[i], disp=isDel?cur.substring(0,j--):cur.substring(0,j++);
        document.getElementById("typing").textContent=disp;
        if(!isDel&&j>cur.length){isDel=true;setTimeout(type,2000);}
        else if(isDel&&j<0){isDel=false;i=(i+1)%words.length;j=0;setTimeout(type,500);}
        else setTimeout(type,isDel?60:130);
    }

    // 2. SCROLL REVEAL (MUNCUL SAAT DI-SCROLL)
    function reveal(){
        document.querySelectorAll(".reveal:not(.active)").forEach(r => {
            if(r.getBoundingClientRect().top < window.innerHeight - 100) r.classList.add("active");
        });
    }
    window.addEventListener("scroll", reveal);

    // 3. DATA MODAL PROYEK
    const projectData = {
        tani: { t: "Smart Tani", lb: "Kesulitan jadwal siram cabai.", sl: "Otomasi ESP32 via smartphone.", mf: "Hasil panen naik 30%." },
        absensi: { t: "Sistem Absensi", lb: "Absensi kertas rawan hilang.", sl: "Aplikasi web real-time cloud.", mf: "Data aman & rekap instan." },
        kasir: { t: "Sistem Kasir", lb: "Stok barang sering selisih.", sl: "Software POS otomatis.", mf: "Keuangan terpantau rapi." },
        perpus: { t: "E-Perpus", lb: "Buku sering telat kembali.", sl: "Database inventaris digital.", mf: "Manajemen buku lebih efisien." }
    };

    function openModal(id){
        const d = projectData[id];
        document.getElementById("modalContent").innerHTML = `
            <h3 style="color:#00f2ff; margin-bottom:15px; border-bottom:1px solid #333; padding-bottom:10px;">${d.t}</h3>
            <div class="staggered" style="margin-bottom:10px;"><strong>Latar Belakang:</strong> <p style="font-size:0.85rem; color:#ccc;">${d.lb}</p></div>
            <div class="staggered" style="margin-bottom:10px;"><strong>Solusi:</strong> <p style="font-size:0.85rem; color:#ccc;">${d.sl}</p></div>
            <div class="staggered"><strong>Manfaat:</strong> <p style="font-size:0.85rem; color:#ccc;">${d.mf}</p></div>
        `;
        const m = document.getElementById("projectModal");
        m.style.display = "flex";
        setTimeout(() => {
            m.classList.add('show');
            m.querySelectorAll('.staggered').forEach((el, idx) => {
                setTimeout(() => { el.style.opacity = '1'; el.style.transform = 'translateY(0)'; }, idx * 100);
            });
        }, 10);
    }

    function closeModal(){
        const m = document.getElementById("projectModal");
        m.classList.remove('show');
        setTimeout(() => { m.style.display = "none"; }, 400);
    }

    window.onclick = (e) => { if (e.target == document.getElementById("projectModal")) closeModal(); }
    document.addEventListener("DOMContentLoaded", () => { type(); reveal(); });
</script>

</body>
</html>
